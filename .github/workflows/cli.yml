# CLI: test on every push/PR touching cli/, release binaries on cli-v* tags.
# Builds are CGO_ENABLED=0 -trimpath, so anyone can `go build` the same source
# and compare — the binary you download is the code you can read here.
name: cli
on:
  push:
    branches: [main]
    paths: ["cli/**", ".github/workflows/cli.yml", "install.sh"]
    tags: ["cli-v*"]
  pull_request:
    paths: ["cli/**", ".github/workflows/cli.yml", "install.sh"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...
      - name: Cross-compile linux/darwin × amd64/arm64
        run: |
          for os in linux darwin; do for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath -o /dev/null .
          done; done

  release:
    if: startsWith(github.ref, 'refs/tags/cli-v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Build release matrix
        working-directory: cli
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#cli-}"
          mkdir -p ../dist
          for os in linux darwin; do for arch in amd64 arm64; do
            out=$(mktemp -d)
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath \
              -ldflags "-s -w -X github.com/pacholoamit/songstress-releases/cli/cmd.Version=$VERSION" \
              -o "$out/songstress" .
            tar -C "$out" -czf "../dist/songstress_${os}_${arch}.tar.gz" songstress
          done; done
          cp internal/deploy/manifest.json ../dist/manifest.json
          cd ../dist && sha256sum ./*.tar.gz manifest.json > checksums.txt && ls -la
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#cli-}"
          gh release create "$GITHUB_REF_NAME" \
            --title "songstress CLI $VERSION" \
            --notes "Turnkey Songstress server setup. Install: \`curl -fsSL https://raw.githubusercontent.com/pacholoamit/songstress-releases/main/install.sh | sh\`. Binaries are reproducible: CGO_ENABLED=0 -trimpath from the cli/ source at this tag." \
            dist/*
